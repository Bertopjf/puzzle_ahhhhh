name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Download gradle-wrapper.jar
      run: |
        mkdir -p gradle/wrapper
        cd gradle/wrapper
        wget -q https://services.gradle.org/distributions/gradle-8.1-wrapper.zip
        unzip -q gradle-8.1-wrapper.zip 'gradle-8.1/lib/gradle-wrapper.jar'
        mv gradle-8.1/lib/gradle-wrapper.jar .
        rm -rf gradle-8.1 gradle-8.1-wrapper.zip
        cd ../..
    
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: app/build/outputs/apk/release/
